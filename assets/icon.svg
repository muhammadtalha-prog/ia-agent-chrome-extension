<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Glow -->
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#0b0b0f" stop-opacity="0" />
    </radialGradient>
    
    <!-- Linear Gradient for Logo -->
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="50%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>

    <!-- Drop Shadow for Depth -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Circle (Sleek dark theme outline) -->
  <circle cx="256" cy="256" r="240" fill="#0f0f15" stroke="url(#logoGradient)" stroke-width="8" />
  <circle cx="256" cy="256" r="240" fill="url(#bgGlow)" />

  <!-- Abstract Brain / Connection Network Node Symbol -->
  <g filter="url(#glow)">
    <!-- Central Processing Unit/Core -->
    <rect x="236" y="236" width="40" height="40" rx="10" fill="#ffffff" />
    
    <!-- Left Brain Node Group -->
    <circle cx="160" cy="180" r="24" fill="url(#logoGradient)" />
    <circle cx="140" cy="256" r="28" fill="url(#logoGradient)" />
    <circle cx="170" cy="332" r="22" fill="url(#logoGradient)" />

    <!-- Right Brain Node Group -->
    <circle cx="352" cy="180" r="24" fill="url(#logoGradient)" />
    <circle cx="372" cy="256" r="28" fill="url(#logoGradient)" />
    <circle cx="342" cy="332" r="22" fill="url(#logoGradient)" />

    <!-- Top Connection Node -->
    <circle cx="256" cy="130" r="26" fill="url(#logoGradient)" />
    <!-- Bottom Connection Node -->
    <circle cx="256" cy="382" r="20" fill="url(#logoGradient)" />

    <!-- Connecting Neural Paths (Lines) -->
    <path d="M256 130 L160 180 M256 130 L352 180 M160 180 L140 256 M352 180 L372 256 M140 256 L170 332 M372 256 L342 332 M170 332 L256 382 M342 332 L256 382" 
          stroke="#ffffff" stroke-opacity="0.4" stroke-width="4" stroke-dasharray="8 4" fill="none" />

    <path d="M256 130 L256 236 M256 382 L256 276 M140 256 L236 256 M372 256 L276 256" 
          stroke="#ffffff" stroke-opacity="0.6" stroke-width="5" fill="none" />
  </g>
</svg>
